services:
  - type: web
    name: train-system-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: train-system-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://train-system-web.onrender.com
      - key: SQL_ECHO
        value: "false"

  - type: web
    name: train-system-web
    runtime: static
    rootDir: SE1-Project
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://train-system-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: train-system-db
    databaseName: trains
    user: trains_app
