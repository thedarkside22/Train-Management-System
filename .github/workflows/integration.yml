name: Integration

on:
  push:
    branches: ["main", "master", "claude/**"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  e2e-smoke:
    name: Spin up backend & smoke-test API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API in background
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./e2e.db
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8000/health > /dev/null; then
              echo "API up"; exit 0;
            fi
            sleep 1
          done
          echo "API failed to start"; cat server.log; exit 1

      - name: Smoke-test endpoints
        run: |
          curl -fs http://127.0.0.1:8000/ | tee /dev/stderr
          curl -fs http://127.0.0.1:8000/openapi.json > /dev/null
          echo "✅ smoke OK"
